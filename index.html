<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokal Pedia - Edisi Oren Aceh Timur & Langsa</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-orange: #FF7F50; /* Coral Orange */
            --dark-orange: #E65100; /* Deep Orange */
            --soft-orange: #FFF3E0;
            --dark: #2D3436;
            --white: #ffffff;
            --gray: #636e72;
        }

        /* Base Setup */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--soft-orange); color: var(--dark); scroll-behavior: smooth; }
        h1, h2, .logo { font-family: 'Outfit', sans-serif; }

        /* Navigation */
        nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 18px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(230, 81, 0, 0.1);
        }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--dark-orange); display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--primary-orange); }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 700; margin-left: 25px; transition: 0.3s; font-size: 0.95rem; }
        .nav-links a:hover { color: var(--dark-orange); }

        /* Hero Section */
        .hero {
            height: 65vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1200');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--white);
            text-align: center;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; letter-spacing: -1px; }
        .hero p { font-size: 1.2rem; opacity: 0.9; }
        
        .search-wrapper {
            background: var(--white);
            padding: 10px 25px;
            border-radius: 100px;
            width: 85%;
            max-width: 550px;
            display: flex;
            align-items: center;
            margin-top: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .search-wrapper:focus-within { border-color: var(--primary-orange); }
        .search-wrapper input { border: none; outline: none; width: 100%; padding: 12px; font-size: 1rem; color: var(--dark); }
        .search-wrapper i { color: var(--primary-orange); font-size: 1.3rem; }

        /* Category Filter */
        .categories { padding: 40px 8% 0; text-align: center; }
        .cat-btn {
            padding: 10px 22px;
            margin: 5px;
            border: none;
            border-radius: 50px;
            background: var(--white);
            color: var(--dark-orange);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .cat-btn.active, .cat-btn:hover { background: var(--dark-orange); color: white; }

        /* Menu Grid */
        .section-padding { padding: 60px 8%; }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        .card {
            background: var(--white);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(230, 81, 0, 0.05);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(230, 81, 0, 0.05);
        }
        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(230, 81, 0, 0.15); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-info { padding: 25px; }
        .card-info h3 { margin-bottom: 8px; font-size: 1.3rem; color: var(--dark); }
        .loc-badge { 
            color: var(--dark-orange); 
            background: var(--soft-orange); 
            padding: 5px 12px; 
            border-radius: 10px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 12px;
        }

        /* Map Section */
        #map { height: 400px; border-radius: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 8px solid white; }

        /* Suggestion Box */
        .orange-box {
            background: linear-gradient(135deg, var(--primary-orange), var(--dark-orange));
            color: white;
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(230, 81, 0, 0.3);
        }
        .orange-box h2 { font-size: 2.2rem; margin-bottom: 20px; }
        .orange-box input, .orange-box textarea { 
            background: rgba(255,255,255,0.2); 
            border: 2px solid rgba(255,255,255,0.3); 
            color: white; 
            width: 100%; max-width: 500px;
            padding: 15px; margin-bottom: 15px; border-radius: 15px;
        }
        .orange-box input::placeholder, .orange-box textarea::placeholder { color: rgba(255,255,255,0.7); }
        .btn-white { background: white; color: var(--dark-orange); border: none; padding: 15px 40px; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-white:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        footer { background: var(--dark); color: white; padding: 40px 8%; text-align: center; border-top-left-radius: 40px; border-top-right-radius: 40px; }
        .socials i { font-size: 1.5rem; margin: 0 15px; color: var(--primary-orange); cursor: pointer; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-fire-alt"></i> LOKAL PEDIA</div>
        <div class="nav-links">
            <a href="#menu">Menu</a>
            <a href="#peta">Eksplor Peta</a>
            <a href="#saran">Kirim Saran</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Aceh Timur & Langsa</h1>
        <p>Sensasi Kuliner Penuh Rempah dalam Genggaman</p>
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="mainSearch" placeholder="Cari Sate Matang atau Kopi Sanger...">
        </div>
    </header>

    <div class="categories">
        <button class="cat-btn active">Semua</button>
        <button class="cat-btn">Makanan</button>
        <button class="cat-btn">Minuman</button>
        <button class="cat-btn">Cemilan</button>
    </div>

    <section class="section-padding" id="menu">
        <div class="menu-grid" id="foodGrid">
            </div>
    </section>

    <section class="section-padding" id="peta">
        <h2 style="margin-bottom: 25px; text-align: center; color: var(--dark-orange);">Lokasi Jajanan Terpopuler</h2>
        <div id="map"></div>
    </section>

    <section class="section-padding" id="saran">
        <div class="orange-box">
            <h2>Ada Tempat Jajan Baru?</h2>
            <p style="margin-bottom: 30px; opacity: 0.9;">Bantu warga lain menemukan kelezatan baru di sekitar Anda!</p>
            <form id="foodForm">
                <input type="text" placeholder="Nama Makanan" required><br>
                <input type="text" placeholder="Lokasi Kedai" required><br>
                <textarea placeholder="Kenapa ini enak?" rows="3"></textarea><br>
                <button type="submit" class="btn-white">Kirim Sekarang</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="socials">
            <i class="fab fa-instagram"></i>
            <i class="fab fa-tiktok"></i>
            <i class="fab fa-whatsapp"></i>
        </div>
        <p style="margin-top: 20px; font-size: 0.9rem; opacity: 0.7;">Lokal Pedia 2026 | Made with ❤️ for East Aceh & Langsa</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const dataMenu = [
            { id: 1, name: "Mie Aceh Kepiting", loc: "Idi Rayeuk", desc: "Perpaduan mie rempah khas dan kepiting bakau segar.", img: "https://images.unsplash.com/photo-1552611052-33e04de081de?w=400" },
            { id: 2, name: "Sate Matang", loc: "Simpang Ulim", desc: "Sate sapi bumbu rempah dengan kuah soto kaldu yang kental.", img: "https://images.unsplash.com/photo-1561651823-34feb02250e4?w=400" },
            { id: 3, name: "Kopi Sanger", loc: "Langsa", desc: "Kopi saring tarik dengan sentuhan susu kental manis.", img: "https://images.unsplash.com/photo-1541167760496-1628856ab772?w=400" },
            { id: 4, name: "Pisang Srikaya", loc: "Kota Langsa", desc: "Pisang goreng krispi dengan selai srikaya rahasia.", img: "https://images.unsplash.com/photo-1596797038530-2c39da0c7d11?w=400" }
        ];

        const grid = document.getElementById('foodGrid');
        
        function render(items) {
            grid.innerHTML = items.map(item => `
                <div class="card">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="card-info">
                        <span class="loc-badge">${item.loc}</span>
                        <h3>${item.name}</h3>
                        <p style="color: #636e72; font-size: 0.9rem;">${item.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        // Map Setup (Fokus Aceh Timur & Langsa)
        const map = L.map('map').setView([4.75, 97.75], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Marker Contoh
        L.marker([4.47, 97.96]).addTo(map).bindPopup("<b>Pusat Kopi Langsa</b>");
        L.marker([4.95, 97.77]).addTo(map).bindPopup("<b>Mie Aceh Idi Rayeuk</b>");

        // Search Filter
        document.getElementById('mainSearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = dataMenu.filter(m => m.name.toLowerCase().includes(val) || m.loc.toLowerCase().includes(val));
            render(filtered);
        });

        // Form Submit
        document.getElementById('foodForm').onsubmit = (e) => {
            e.preventDefault();
            alert('Mantap! Rekomendasi oren kamu sudah masuk ke sistem kami.');
            e.target.reset();
        }

        render(dataMenu);
    </script>
</body>
</html>
